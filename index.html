<!-- index.html (Avukatlık Demo) -->
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yılmaz Hukuk & Danışmanlık | Profesyonel Çözümler</title>
    <meta name="description" content="Ceza, Aile ve Ticaret hukuku alanlarında uzman avukatlık hizmeti.">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a237e; --accent: #c5a059; }
        body { font-family: 'Poppins', sans-serif; margin: 0; color: #333; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; margin: 0; }
        .hero { padding: 80px 20px; text-align: center; background: #f4f4f4; border-bottom: 4px solid var(--accent); }
        .services { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
        .service-card { border: 1px solid #ddd; padding: 20px; text-align: center; transition: 0.3s; }
        .service-card:hover { border-color: var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn { background: var(--accent); color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <header><h1>YILMAZ HUKUK</h1></header>
    <section class="hero">
        <h2>Haklarınız Bizimle Güvende</h2>
        <p>15 yıllık tecrübe ile hukuki süreçlerinizde yanınızdayız.</p><br>
        <a href="#" class="btn">Ücretsiz Ön Görüşme Randevusu</a>
    </section>
    <div class="services">
        <div class="service-card"><h3>Aile Hukuku</h3><p>Boşanma ve velayet süreçleri.</p></div>
        <div class="service-card"><h3>Ceza Hukuku</h3><p>Etkin savunma ve danışmanlık.</p></div>
        <div class="service-card"><h3>Ticaret Hukuku</h3><p>Şirketler için hukuki altyapı.</p></div>
    </div>
</body>
</html>
